<style>
.fot.navbar { padding: 0; margin: 0; } .wraplik { background: var(--color-1); padding: 10px; margin: 0 0 20px 0; display: flex; gap: 10px; justify-content: space-between; border-radius: 0.38em; font-size: 0.8em; font-family: var(--cuerpo1); color: var(--color-3); line-height: 1.5em; }
.oscuro  .wraplik { background: var(--color-5);}
.wraplik .icon-home { display: flex; align-items: center; gap: 10px; color: var(--color-3); font-weight: 900; }
/*PREVIEW*/ 
form[name="post"] h1.page-title { font-family: var(--titulos); color: var(--color-3); font-size: 2em; margin: 20px 0; text-transform: uppercase; }
form[name="post"] #preview { background: var(--color-1); padding: 10px; margin: 0; border-radius: 0.38em; color: var(--color-6); }
.oscuro form[name="post"] #preview { background: var(--color-5); }
form[name="post"] .postbody { padding: 0; line-height: 1.5em; color: var(--color-6); width: 100%; float: left; clear: both; }
form[name="post"] .postbody .h3 { margin: 0; background: var(--tcolor3); padding: 10px; border-radius: 0.18em; font-family: var(--titulos); color: var(--color-5); }
form[name="post"] .postbody .content { word-wrap: break-word; font-family: var(--cuerpo1); font-size: 1.2em; hyphens: auto; line-height: 1.5em; color: var(--color-6); overflow: visible; margin: 10px 0; }
form[name="post"] .h3 { font-family: var(--titulos); text-transform: uppercase; border-bottom: 10px solid var(--color-3); font-size: 1.05em; color: var(--color-3); margin: 20px 0; padding: 0 0 10px 0; }
form[name="post"] fieldset.fields1 dt { width: 18em; border-right-width: 0; }
form[name="post"] dt label { font-weight: 700; text-align: left; font-size: .9em; padding: 0 10px; }
form[name="post"] fieldset.fields1 dd { margin-left: 10em; border-left-width: 0; width: -webkit-fill-available; }

form[name="jumpbox"] select { font-family: var(--cuerpo1); font-weight: 400; cursor: pointer; vertical-align: middle; border: 1px solid var(--color-3); padding: 4px; background-color: var(--color-5); font-size: 0.9em; border-radius: 0.18em; }
/* EDITOR */
#textarea_content { display: flex; flex-direction: column; height: 100%; }
#postingbox .sceditor-container { background: var(--color-5); border: 1px solid var(--tcolor3); border-radius: 0.38em; color: var(--color-6); position: relative; overflow: hidden; display: flex; flex-direction: column; flex: 1; height: 100%; min-height: 420px; }
#postingbox div.sceditor-toolbar { background: var(--color-5); border-bottom: 1px solid var(--tcolor3); padding: 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; overflow: visible; min-height: 64px; flex-shrink: 0; }
#postingbox div.sceditor-group { background: var(--color-1); border: 1px solid var(--tcolor3); border-radius: 0.28em; padding: 0 8px; display: flex; align-items: center; justify-content: flex-start; gap: 5px; flex: 0 0 auto; height: 46px; }
#postingbox a.sceditor-button { width: 35px; height: 35px; display: flex !important; align-items: center; justify-content: center; border-radius: 0.2em; transition: 300ms ease; }

#postingbox fieldset.fields1 div { margin-bottom: 0 !important; }

#postingbox a.sceditor-button { width: 32px; height: 32px; }}
/*TITULO*/
#postingbox fieldset.fields1 dt { width: 13em; border-right-width: 0; padding: 0 10px; }

<style>
