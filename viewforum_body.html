{BOARD_INDEX}
<style>
.titlecate h2 {
    font-size: 2em;
    font-family: var(--titulos);
    text-transform: uppercase;
    color: var(--color-3);
}  
.ultima { grid-row: 3 / 5; }  
.typ { grid-column: 4 / 5; grid-row: 2 / 5; flex-flow: column; }
.fori .topics, .fori .posts { flex-flow: column; background: var(--color-5); width: auto; color: var(--color-3); }  
</style>  

<div class="forumb">
<div class="n-s">  
  <div class="n-tem">
    <a href="{U_POST_NEW_TOPIC}" accesskey="n" rel="nofollow"><i class="fi fi-rr-edit-alt"></i> Nuevo tema</a>
  </div>
  
<div class="search-p">
    <form method="get" id="forum-search" action="{S_SEARCHBOX_ACTION}">
      <fieldset class="search-field">
        
        <i class="fi fi-rr-audit search-icon"></i>

        <input class="inputbox search tiny" 
          type="text" 
          name="search_keywords" 
          id="search_keywords" 
          size="20" 
          value="{L_SEARCH}"
          onclick="if (this.value == '{L_SEARCH}') this.value = '';"
          onblur="if (this.value == '') this.value = '{L_SEARCH}';" 
        />

        <input class="button2" type="submit" value="{L_SEARCH}" />

        <input type="hidden" value="{SEARCH_WHERE}" name="search_where" />

      </fieldset>
    </form>
</div>
  </div>
  
  
<div class="mrpgt">  
  <div class="mark-l">
  <a href="{U_MARK_READ}">Marcar todo como leido</a>
  </div>
  <div class="pgt">
  {PAGINATION}
  </div>
</div>  
  
</div>

{TOPICS_LIST_BOX}


<div class="forumb">
<div class="n-s">  
 <div class="n-tem">
    <a href="{U_POST_NEW_TOPIC}" accesskey="n" rel="nofollow"><i class="fi fi-rr-edit-alt"></i> Nuevo tema</a>
  </div>
</div>
  
  
<div class="mrpgt">  
  <div class="mark-l">
  <a href="{U_MARK_READ}">Marcar todo como leido</a>
  </div>
  <div class="pgt">
  {PAGINATION}
  </div>
</div>  
  
</div>

<div class="action-box">
<!-- BEGIN switch_sort_options -->
<div id="sort-box">
<form method="post" class="sort-form">
<fieldset>
<p><i class="fi fi-rr-sort-alt"></i> Ordenar por</p>
<select name="sort_method">{switch_sort_options.S_OPTIONS}</select>
<input class="button2" type="submit" value="{switch_sort_options.L_SORT}" />
</fieldset>
</form>
</div>
<!-- END switch_sort_options -->

<form action="{S_JUMPBOX_ACTION}" method="get" name="jumpbox" onsubmit="if(document.jumpbox.f.value == -1){return false;}">
<fieldset class="vf_jumpbox">
<p><i class="fi fi-rr-calendar-shift-swap"></i> Cambiar a</p>
{S_JUMPBOX_SELECT}
<input class="button2" type="submit" value="{L_GO}" />
</fieldset>
</form>
</div>

<div class="vusnav">
<h4>Navegando ahora en este subforo</h4>  
<p>{LOGGED_IN_USER_LIST}</p>
</div>

<div id="info_open" style="display:block;clear:both">
<div class="h3">{L_TABS_PERMISSIONS}</div>
<p>{S_AUTH_LIST}</p>
</div>

<style>
.forumb {
  background: var(--color-5);
  border-radius: 0.38em;
  display: grid;
  grid-template-columns: 1fr auto; 
  align-items: center;
  padding: 10px;
  margin: 0 0 20px 0;
  gap: 10px;
  width: 100%;
}
  
.n-s, .mrpgt {
    display: flex;
    max-height: 40px;
}

.n-tem {
    background: var(--color-3);
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: left;
    min-width: 150px;
    border-radius: 0.18em;
    max-height: 40px;
    transition: background 400ms;
}  
  
.n-tem a {
    font-size: 1em;
    color: var(--color-4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: -webkit-fill-available;
    font-family: var(--cuerpo1);
    text-transform: uppercase;
    font-weight: 500;
}  
  
.n-tem:hover {
  background: var(--color-2);
  color: var(--color-5);
}  
  
.search-p {
  margin: 0 0 0 10px;
  background: transparent;
}

.search-field {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--color-1);
    border-radius: 0.18em;
    padding: 10px;
    transition: all 0.3s ease;
    width: 180px;
    max-height: 40px;
}

.search-field:focus-within {
  box-shadow: 0 0 0 2px var(--tcolor3), 0 5px 10px var(--tcolor3);
  transform: translateY(-1px);
}

.search-icon {
    font-size: 1em;
    margin-right: 8px;
    transition: 300ms;
    color: var(--color-3);
}

.search-field:focus-within .search-icon {
  opacity: 1;
  transform: scale(1.1);
}

#search_keywords {
    border: none;
    background: transparent;
    outline: none;
    color: var(--color-3);
    font-size: 0.8em;
    width: auto;
    font-family: var(--cuerpo1);
    text-transform: uppercase;
}

.button2 {
  display: none;
}
  
.mark-l {
    background: var(--color-1);
    margin: 0 10px 0 0;
    padding: 10px;
    border-radius: 0.18em;
    display: flex;
    align-items: center;
} 
  
.mark-l a {
    font-size: 1em;
    color: var(--color-3);
    font-weight: 500;
}  
  
.mark-l a:hover, .pgt a:hover { letter-spacing: 0px;}  
  
.pgt {
    background: var(--color-1);
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-3);
    border-radius: 0.18em;
} 
  
.action-box {
    text-align: right;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--color-1);
    border-radius: 0.38em;
    padding: 10px;
    color: var(--color-6);
}
  
#sort-box fieldset {
    display: flex;
    gap: 10px;
    font-size: 0.7em;
    color: var(--color-6);
    background: var(--color-5);
    padding: 10px;
    align-items: center;
    text-transform: uppercase;
}
  
#sort-box fieldset p {
    color: var(--color-3);
    font-weight: 900;
    font-family: var(--titulos);
    display: flex;
    align-items: center;
    gap: 10px;
}  
  
#sort-box fieldset select{
    font-family: var(--cuerpo1);
    font-weight: 400;
    cursor: pointer;
    vertical-align: middle;
    border: none;
    background-color: var(--color-1);
    padding: 10px;
    border-radius: 0.18em;
      color: var(--color-6);
}  
  
.action-box fieldset.vf_jumpbox {
    text-align: right;
    height: auto;
    min-height: 2.5em;
    display: flex;
    align-items: center;
    background: var(--color-5);
    padding: 10px;
    gap: 10px;
    font-size: 0.7em;
    text-transform: uppercase;
}  
  
.action-box fieldset.vf_jumpbox p {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--color-3);
    font-family: var(--titulos);
}  
  
.action-box fieldset.vf_jumpbox select {
    font-family: var(--cuerpo1);
    font-weight: 400;
    cursor: pointer;
    vertical-align: middle;
    border: none;
    padding: 10px;
      color: var(--color-6);
    background-color: var(--color-1);
}  
  
.vusnav {
    margin: 20px 0 0 0;
    background: var(--color-5);
    padding: 10px;
    display: flex;
    flex-flow: column;
    gap: 10px;
    color: var(--color-6);
    border-radius: 0.38em;
}  
  
.vusnav h4 {
    margin: 0;
    border-bottom: 10px solid var(--color-3);
    padding: 0 0 10px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--titulos);
    color: var(--color-3);
    opacity: 0.7;
}  
  
.vusnav p {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    font-size: 0px;
    min-height: 20px;
}  
  
.vusnav a {
    font-size: 12px;
    text-transform: uppercase;
}  
  
#info_open {
    display: block;
    clear: both;
    padding: 10px;
    background: var(--color-5);
    margin: 20px 0 0 0;
    color: var(--color-6);
    border-radius: 0.38em;
}  
  
#info_open .h3{
    margin: 0;
}  
</style>
